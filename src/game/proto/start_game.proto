syntax = "proto3";

package GameStates;

message StartGame {
    GameType gameType = 1;
    uint32 player1 = 2;
    uint32 player2 = 3;
    Army player1Army = 4;
    Army player2Army = 5;
    Level level = 6;
}

enum GameType {
    GAMETYPE_FREE_FOR_ALL = 0;
}

message Army {
    string name = 1;
    repeated Operator operative = 2;
}

message Operator {
    string name = 1;
    uint32 movememnt = 2;
    uint32 actionPointLimit = 3;
    uint32 groupActivation = 4;
    uint32 defense = 5;
    uint32 save = 6;
    uint32 wounds = 7;
    repeated string keywords = 9;
}

message Level {
    string resource = 1;
}

message SpawnArea {
    Point topLeft = 1;
    float width = 2;
    float length = 3;
}

message Point {
    float x = 1;
    float y = 2;
}
